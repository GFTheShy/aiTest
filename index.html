<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Listing Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

.header h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.header p {
    color: #94a3b8;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 20px;
    background: #0b1220;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
}

.tags {
    margin-top: 10px;
    font-size: 12px;
    color: #94a3b8;
}

.badge {
    display: inline-block;
    background: #22c55e;
    color: black;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="badge">AI POWERED</div>
        <h1>Amazon & TikTok Listing Generator</h1>
        <p>Generate high-converting product listings in seconds</p>
    </div>

    <div class="card">

        <input id="product" placeholder="Enter product (e.g. wireless earphone)" />

        <button onclick="generate()">Generate High-Converting Listings</button>

        <div class="result" id="output">Your results will appear here...</div>

        <div class="tags">
            ✨ Amazon Titles • TikTok Hooks • SEO Descriptions • Hashtags
        </div>

    </div>
</div>

<script>
const API_KEY = "YOUR_GROQ_API_KEY";

async function generate() {
    const product = document.getElementById("product").value;
    const output = document.getElementById("output");

    output.innerText = "Generating high-converting listings...";

    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
            model: "llama3-70b-8192",
            messages: [
                {
                    role: "system",
                    content: "You are a senior Amazon + TikTok ecommerce copywriter who writes high-conversion listings."
                },
                {
                    role: "user",
                    content: `
Create HIGH-CONVERTING ecommerce content:

Product: ${product}

Output format:
1. Amazon Titles (3)
2. TikTok Viral Hooks (3)
3. Product Description (persuasive)
4. 20 SEO Hashtags

Make it sound like a real $1M selling product.
`
                }
            ]
        })
    });

    const data = await res.json();

    if (data.choices && data.choices.length > 0) {
        output.innerText = data.choices[0].message.content;
    } else {
        output.innerText = "Error: " + JSON.stringify(data);
    }
}
</script>

</body>
</html>
