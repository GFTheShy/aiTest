<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Free AI Listing Generator</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; }
    input, button { padding: 12px; width: 100%; margin: 10px 0; }
    button { cursor: pointer; }
    pre { background: #f4f4f4; padding: 15px; white-space: pre-wrap; }
  </style>
</head>

<body>

<h2>🔥 Free AI Product Listing Generator</h2>

<input id="product" placeholder="Enter product (e.g. wireless earphone)" />
<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
const API_KEY = "YOUR_GROQ_API_KEY";

async function generate() {
    const product = document.getElementById("product").value;
    const output = document.getElementById("output");

    output.innerText = "Generating...";

    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
            model: "llama3-70b-8192",
            messages: [
                {
                    role: "system",
                    content: "You are an expert Amazon and TikTok ecommerce copywriter."
                },
                {
                    role: "user",
                    content: `Generate:
1. 3 Amazon product titles
2. 3 TikTok viral titles
3. Product description
4. 20 hashtags

Product: ${product}`
                }
            ]
        })
    });

    const data = await res.json();

    if (data.choices && data.choices.length > 0) {
        output.innerText = data.choices[0].message.content;
    } else {
        output.innerText = "Error: " + JSON.stringify(data);
    }
}
</script>

</body>
</html>
