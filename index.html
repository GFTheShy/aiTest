<script>
const API_KEY = "sk-221d4ff14c244d579e43aa8762144764";

// 初始化
function init() {
    if (!localStorage.getItem("free")) {
        localStorage.setItem("free", "3");
    }
    if (!localStorage.getItem("bonus")) {
        localStorage.setItem("bonus", "0");
    }
    updateUI();
}

function getTotal() {
    return parseInt(localStorage.getItem("free")) +
           parseInt(localStorage.getItem("bonus"));
}

function consume() {
    let free = parseInt(localStorage.getItem("free"));
    let bonus = parseInt(localStorage.getItem("bonus"));

    if (bonus > 0) {
        localStorage.setItem("bonus", bonus - 1);
    } else {
        localStorage.setItem("free", free - 1);
    }
}

function updateUI() {
    document.getElementById("usageInfo").innerText =
        `剩余次数：${getTotal()}`;
}

function invite() {
    let bonus = parseInt(localStorage.getItem("bonus"));
    localStorage.setItem("bonus", bonus + 5);

    alert("🎉 邀请成功 +5 次！");
    updateUI();
}

async function generate() {
    init();

    const product = document.getElementById("product").value;
    const output = document.getElementById("output");

    if (getTotal() <= 0) {
        output.innerText = "次数已用完，邀请好友可增加次数";
        return;
    }

    if (!product) {
        output.innerText = "请输入商品";
        return;
    }

    output.innerText = "生成中...";

    consume();
    updateUI();

    try {
        const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: [
                    {
                        role: "system",
                        content: "你是一个资深跨境电商文案专家"
                    },
                    {
                        role: "user",
                        content: `
商品：${product}

生成：
1. 亚马逊标题（3个）
2. TikTok标题（3个）
3. 商品描述
4. 20个标签
                        `
                    }
                ]
            })
        });

        const data = await res.json();

        if (data.choices && data.choices.length > 0) {
            output.innerText = data.choices[0].message.content;
        } else {
            output.innerText = "生成失败：" + JSON.stringify(data);
        }

    } catch (err) {
        output.innerText = "请求错误：" + err.message;
    }
}

init();
</script>
